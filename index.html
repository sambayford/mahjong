<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=5.0, user-scalable=yes">
<title>🀄 Mahjong</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Cinzel+Decorative:wght@700&display=swap');

  :root {
    --bg: #0d0d14;
    --felt: #0e1f14;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --red: #c0392b;
    --tile-bg: #fdf6e3;
    --tile-shadow: #8b7355;
    --tile-border: #d4b483;
    --tile-hover: #fff8e8;
    --tile-sel: #ffe082;
    --tile-matched: #a5d6a7;
    --text-dark: #2c1810;
    --panel: rgba(255,255,255,0.04);
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--gold);
    font-family: 'Noto Serif SC', serif;
    overflow: hidden;
    user-select: none;
  }

  /* === BACKGROUND PATTERN === */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg, rgba(201,168,76,0.03) 0, rgba(201,168,76,0.03) 1px, transparent 0, transparent 50%),
      repeating-linear-gradient(-45deg, rgba(201,168,76,0.03) 0, rgba(201,168,76,0.03) 1px, transparent 0, transparent 50%);
    background-size: 30px 30px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 100vw;
    transform-origin: top left;
    display: flex;
    flex-direction: column;
    padding-bottom: 32px;
  }

  /* === HEADER === */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }

  .logo {
    font-family: 'Cinzel Decorative', serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 1px;
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
  }

  .stats {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--gold-light);
  }

  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat-val { font-size: 18px; font-weight: bold; line-height: 1; }
  .stat-lbl { font-size: 10px; opacity: 0.6; letter-spacing: 1px; text-transform: uppercase; }

  /* === TOOLBAR === */
  .toolbar {
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .btn {
    flex: 1;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    font-family: inherit;
    font-size: 12px;
    padding: 8px 4px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    text-align: center;
  }
  .btn:active { transform: scale(0.95); background: rgba(201,168,76,0.2); }
  .btn.danger { border-color: rgba(192,57,43,0.5); color: #e57373; }
  .btn.danger:active { background: rgba(192,57,43,0.2); }
  .btn:disabled { opacity: 0.3; pointer-events: none; }

  /* === BOARD WRAPPER === */
  .board-wrap {
    flex: 1;
    overflow: visible;
    padding: 16px 0 16px 16px;
    position: relative;
  }

  #board {
    position: relative;
    /* will be sized by JS */
  }

  /* === TILES === */
  .tile {
    position: absolute;
    background: var(--tile-bg);
    border: 1.5px solid var(--tile-border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
    box-shadow:
      2px 2px 0 var(--tile-shadow),
      3px 3px 6px rgba(0,0,0,0.4);
    will-change: transform;
    /* stacking context per layer handled by z-index */
  }

  .tile svg { display: block; pointer-events: none; }
  .tile span { font-size: 22px; line-height: 1; pointer-events: none; }

  .tile::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: calc(var(--radius) - 1px);
    background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, transparent 50%);
    pointer-events: none;
  }

  .tile.blocked {
    cursor: default;
    filter: brightness(0.75) saturate(0.6);
  }

  .tile.free {
    cursor: pointer;
  }
  .tile.free:active {
    transform: translateY(-2px);
    box-shadow: 2px 4px 12px rgba(0,0,0,0.5);
  }

  .tile.selected {
    background: var(--tile-sel);
    border-color: #f9a825;
    box-shadow:
      2px 2px 0 #b8860b,
      0 0 14px rgba(249,168,37,0.6),
      3px 3px 6px rgba(0,0,0,0.4);
    z-index: 200 !important;
    transform: translateY(-3px);
  }

  .tile.matched {
    animation: matchPop 0.35s ease forwards;
  }

  @keyframes matchPop {
    0%   { transform: scale(1); opacity: 1; }
    40%  { transform: scale(1.15); opacity: 0.8; background: var(--tile-matched); }
    100% { transform: scale(0); opacity: 0; }
  }

  /* === HINT PULSE === */
  .tile.hint {
    animation: hintPulse 0.8s ease-in-out 3;
  }
  @keyframes hintPulse {
    0%, 100% { box-shadow: 2px 2px 0 var(--tile-shadow), 3px 3px 6px rgba(0,0,0,0.4); }
    50% { box-shadow: 2px 2px 0 var(--tile-shadow), 0 0 18px rgba(100,220,255,0.8), 3px 3px 6px rgba(0,0,0,0.4); background: #e3f2fd; border-color: #4fc3f7; }
  }

  /* === OVERLAY === */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 32px;
    text-align: center;
  }
  .overlay.show { display: flex; }

  .overlay-icon { font-size: 64px; animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
  @keyframes popIn { from { transform: scale(0) rotate(-20deg); } to { transform: scale(1) rotate(0); } }

  .overlay-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 26px;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(201,168,76,0.6);
  }

  .overlay-sub {
    font-size: 14px;
    color: var(--gold-light);
    opacity: 0.8;
    max-width: 280px;
    line-height: 1.5;
  }

  .overlay-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 280px;
  }

  .ov-stat {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 8px;
    padding: 12px;
  }
  .ov-stat-val { font-size: 22px; font-weight: bold; color: var(--gold-light); }
  .ov-stat-lbl { font-size: 10px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

  .overlay-btns { display: flex; gap: 12px; width: 100%; max-width: 280px; }
  .overlay-btns .btn { font-size: 14px; padding: 12px; }

  /* === PROGRESS BAR === */
  .progress-wrap {
    padding: 4px 16px 8px;
  }
  .progress-bar-bg {
    height: 4px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    opacity: 0.5;
    margin-top: 3px;
    letter-spacing: 0.5px;
  }

  /* === BEST SCORE === */
  .best-wrap {
    text-align: center;
    font-size: 11px;
    opacity: 0.45;
    padding-bottom: 6px;
    letter-spacing: 1px;
  }

  /* === TOAST === */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(30,30,40,0.95);
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold-light);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 500;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* === LAYOUT PICKER === */
  .layout-bar {
    display: flex;
    gap: 6px;
    padding: 6px 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }
  .layout-bar::-webkit-scrollbar { display: none; }

  .layout-btn {
    flex-shrink: 0;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    color: rgba(201,168,76,0.6);
    font-family: inherit;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .layout-btn.active {
    background: rgba(201,168,76,0.2);
    border-color: var(--gold);
    color: var(--gold);
  }
  .layout-btn:active { transform: scale(0.95); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">🀄 Mahjong</div>
    <div class="stats">
      <div class="stat"><span class="stat-val" id="pairsLeft">0</span><span class="stat-lbl">Left</span></div>
      <div class="stat"><span class="stat-val" id="timerVal">0:00</span><span class="stat-lbl">Time</span></div>
      <div class="stat"><span class="stat-val" id="movesVal">0</span><span class="stat-lbl">Moves</span></div>
    </div>
  </header>

  <div class="layout-bar" id="layoutBar"></div>

  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label"><span id="progressLeft">0 pairs left</span><span id="progressTotal"></span></div>
  </div>

  <div class="toolbar">
    <button class="btn" id="btnUndo">↩ Undo</button>
    <button class="btn" id="btnHint">💡 Hint</button>
    <button class="btn" id="btnShuffle">🔀 Shuffle</button>
    <button class="btn danger" id="btnNew">✦ New</button>
  </div>

  <div class="best-wrap" id="bestWrap"></div>

  <div class="board-wrap">
    <div id="board"></div>
  </div>
</div>

<div id="toast"></div>

<div class="overlay" id="overlayWin">
  <div class="overlay-icon">🏆</div>
  <div class="overlay-title">Victory!</div>
  <div class="overlay-sub">All tiles cleared. Excellent work!</div>
  <div class="overlay-stats">
    <div class="ov-stat"><div class="ov-stat-val" id="winTime">-</div><div class="ov-stat-lbl">Time</div></div>
    <div class="ov-stat"><div class="ov-stat-val" id="winMoves">-</div><div class="ov-stat-lbl">Moves</div></div>
    <div class="ov-stat"><div class="ov-stat-val" id="winScore">-</div><div class="ov-stat-lbl">Score</div></div>
    <div class="ov-stat"><div class="ov-stat-val" id="winBest">-</div><div class="ov-stat-lbl">Best</div></div>
  </div>
  <div class="overlay-btns">
    <button class="btn" id="btnWinNew">New Game</button>
    <button class="btn" id="btnWinReplay">Replay</button>
  </div>
</div>

<div class="overlay" id="overlayStuck">
  <div class="overlay-icon">😵</div>
  <div class="overlay-title">No Moves!</div>
  <div class="overlay-sub">No more valid pairs available. Shuffle the board or start fresh.</div>
  <div class="overlay-btns">
    <button class="btn" id="btnStuckShuffle">🔀 Shuffle</button>
    <button class="btn danger" id="btnStuckNew">New Game</button>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════
// TILE DEFINITIONS
// Each group of 4 identical = one "suit" entry
// ═══════════════════════════════════════════
const SUITS = [
  // Characters (man)
  { emoji: '1️⃣', id: 'c1' }, { emoji: '2️⃣', id: 'c2' }, { emoji: '3️⃣', id: 'c3' },
  { emoji: '4️⃣', id: 'c4' }, { emoji: '5️⃣', id: 'c5' }, { emoji: '6️⃣', id: 'c6' },
  { emoji: '7️⃣', id: 'c7' }, { emoji: '8️⃣', id: 'c8' }, { emoji: '9️⃣', id: 'c9' },
  // Bamboo
  { emoji: '🎋', id: 'b1' }, { emoji: '🎍', id: 'b2' }, { emoji: '🌿', id: 'b3' },
  { emoji: '🌱', id: 'b4' }, { emoji: '🪴', id: 'b5' }, { emoji: '🌾', id: 'b6' },
  { emoji: '🌴', id: 'b7' }, { emoji: '🌲', id: 'b8' }, { emoji: '🌳', id: 'b9' },
  // Circles (rendered as dot grids via getTileContent)
  { emoji: 'dots:1', id: 'o1' }, { emoji: 'dots:2', id: 'o2' }, { emoji: 'dots:3', id: 'o3' },
  { emoji: 'dots:4', id: 'o4' }, { emoji: 'dots:5', id: 'o5' }, { emoji: 'dots:6', id: 'o6' },
  { emoji: 'dots:7', id: 'o7' }, { emoji: 'dots:8', id: 'o8' }, { emoji: 'dots:9', id: 'o9' },
  // Winds
  { emoji: '🌬️', id: 'w1' }, { emoji: '🌊', id: 'w2' }, { emoji: '🌀', id: 'w3' }, { emoji: '🔥', id: 'w4' },
  // Dragons
  { emoji: '🐉', id: 'd1' }, { emoji: '🐲', id: 'd2' }, { emoji: '☯️', id: 'd3' },
  // Flowers (unique — any flower matches any flower, 4 types × 1 tile each → 2 pairs)
  { emoji: '🌸', id: 'f1' }, { emoji: '🌺', id: 'f2' }, { emoji: '🌻', id: 'f3' }, { emoji: '🌹', id: 'f4' },
  // Seasons (same — any season matches any season)
  { emoji: '🌷', id: 's1' }, { emoji: '🍂', id: 's2' }, { emoji: '❄️', id: 's3' }, { emoji: '☀️', id: 's4' },
];

// Group by matchability: flowers match each other, seasons match each other, rest match by id
// For simplicity we treat each id as its own match group (flowers/seasons get unique ids so they pair exactly)

// ═══════════════════════════════════════════
// LAYOUTS  (col, row, layer)
// ═══════════════════════════════════════════
const LAYOUTS = {
  turtle: {
    name: '🐢 Turtle',
    build() {
      const pos = [];
      // Layer 0: main 12×8 grid (exclude corners)
      for (let r = 0; r < 8; r++)
        for (let c = 0; c < 12; c++)
          if (!((r === 0 || r === 7) && (c < 2 || c > 9)))
            pos.push([c, r, 0]);
      // Layer 1: 8×6
      for (let r = 1; r < 7; r++)
        for (let c = 2; c < 10; c++)
          pos.push([c, r, 1]);
      // Layer 2: 4×4
      for (let r = 2; r < 6; r++)
        for (let c = 4; c < 8; c++)
          pos.push([c, r, 2]);
      // Layer 3: 2×2
      for (let r = 3; r < 5; r++)
        for (let c = 5; c < 7; c++)
          pos.push([c, r, 3]);
      // Top
      pos.push([5.5, 3.5, 4]);
      // Left/right singles
      pos.push([-1, 3.5, 0]);
      pos.push([13, 3.5, 0]);
      return pos;
    }
  },
  pyramid: {
    name: '⛩️ Gate',
    build() {
      const pos = [];
      // rows 0-7, each row smaller
      const rows = [12, 10, 8, 6, 4, 2, 1, 1];
      const offsets = [0, 1, 2, 3, 4, 5, 5.5, 5.5];
      rows.forEach((w, r) => {
        for (let c = 0; c < w; c++)
          pos.push([offsets[r] + c, r, r > 4 ? r - 4 : 0]);
      });
      return pos;
    }
  },
  cross: {
    name: '✚ Cross',
    build() {
      const pos = [];
      // Horizontal bar
      for (let c = 0; c < 14; c++) pos.push([c, 3, 0]), pos.push([c, 4, 0]);
      // Vertical bar
      for (let r = 0; r < 10; r++) pos.push([6, r, 0]), pos.push([7, r, 0]);
      // Remove duplicates
      const seen = new Set();
      return pos.filter(([c, r, l]) => {
        const k = `${c},${r},${l}`;
        if (seen.has(k)) return false;
        seen.add(k); return true;
      });
    }
  },
  dragon: {
    name: '🐉 Dragon',
    build() {
      const pos = [];
      // Body
      for (let c = 2; c < 12; c++) pos.push([c, 3, 0]), pos.push([c, 4, 0]);
      // Head
      for (let r = 1; r < 7; r++) pos.push([0, r, 0]), pos.push([1, r, 0]);
      // Tail
      pos.push([12, 2, 0]); pos.push([12, 5, 0]);
      pos.push([13, 1, 0]); pos.push([13, 6, 0]);
      // Spine (layer 1)
      for (let c = 3; c < 11; c++) pos.push([c, 3.5, 1]);
      // Eyes
      pos.push([0.5, 2, 1]); pos.push([0.5, 5, 1]);
      return pos;
    }
  },
  fortress: {
    name: '🏯 Fortress',
    build() {
      const pos = [];
      const dedup = new Set();
      const add = (c, r, l) => { const k=`${c},${r},${l}`; if(!dedup.has(k)){dedup.add(k);pos.push([c,r,l]);} };
      // Outer walls — full perimeter 16×10
      for (let c = 0; c < 16; c++) { add(c,0,0); add(c,9,0); }
      for (let r = 0; r < 10; r++) { add(0,r,0); add(15,r,0); }
      // Inner walls — 12×6 perimeter
      for (let c = 2; c < 14; c++) { add(c,2,0); add(c,7,0); }
      for (let r = 2; r < 8; r++) { add(2,r,0); add(13,r,0); }
      // Fill interior 10×4
      for (let r = 3; r < 7; r++) for (let c = 3; c < 13; c++) add(c,r,0);
      // Layer 1: 8×3 interior
      for (let r = 3; r < 7; r++) for (let c = 4; c < 12; c++) add(c,r,1);
      // Layer 2: 6×2
      for (let r = 4; r < 6; r++) for (let c = 5; c < 11; c++) add(c,r,2);
      // Layer 3: 4×2
      for (let r = 4; r < 6; r++) for (let c = 6; c < 10; c++) add(c,r,3);
      // Layer 4: 2×2 keep
      for (let r = 4; r < 6; r++) for (let c = 7; c < 9; c++) add(c,r,4);
      // Corner towers (layer 1)
      add(0,0,1); add(15,0,1); add(0,9,1); add(15,9,1);
      return pos;
    }
  },
  empire: {
    name: '🌏 Empire',
    build() {
      const pos = [];
      const dedup = new Set();
      const add = (c, r, l) => { const k=`${c},${r},${l}`; if(!dedup.has(k)){dedup.add(k);pos.push([c,r,l]);} };
      // Base: full 18×10 grid
      for (let r = 0; r < 10; r++) for (let c = 0; c < 18; c++) add(c,r,0);
      // Layer 1: 14×8
      for (let r = 1; r < 9; r++) for (let c = 2; c < 16; c++) add(c,r,1);
      // Layer 2: 10×6
      for (let r = 2; r < 8; r++) for (let c = 4; c < 14; c++) add(c,r,2);
      // Layer 3: 6×4
      for (let r = 3; r < 7; r++) for (let c = 6; c < 12; c++) add(c,r,3);
      // Layer 4: 4×2
      for (let r = 4; r < 6; r++) for (let c = 7; c < 11; c++) add(c,r,4);
      // Layer 5: 2×2 peak
      for (let r = 4; r < 6; r++) for (let c = 8; c < 10; c++) add(c,r,5);
      return pos;
    }
  },
  labyrinth: {
    name: '🌀 Labyrinth',
    build() {
      const pos = [];
      const dedup = new Set();
      const add = (c, r, l) => { const k=`${c},${r},${l}`; if(!dedup.has(k)){dedup.add(k);pos.push([c,r,l]);} };
      // Concentric rings on layer 0
      // Ring 1: 20×12 perimeter
      for (let c = 0; c < 20; c++) { add(c,0,0); add(c,11,0); }
      for (let r = 1; r < 11; r++) { add(0,r,0); add(19,r,0); }
      // Ring 2: 16×8 perimeter (offset 2)
      for (let c = 2; c < 18; c++) { add(c,2,0); add(c,9,0); }
      for (let r = 3; r < 9; r++) { add(2,r,0); add(17,r,0); }
      // Ring 3: 12×4 perimeter (offset 4)
      for (let c = 4; c < 16; c++) { add(c,4,0); add(c,7,0); }
      for (let r = 5; r < 7; r++) { add(4,r,0); add(15,r,0); }
      // Fill ring 3 interior
      for (let r = 5; r < 7; r++) for (let c = 5; c < 15; c++) add(c,r,0);
      // Corridors connecting rings (gaps intentional for gameplay)
      for (let r = 1; r < 11; r++) { add(9,r,0); add(10,r,0); }
      for (let c = 1; c < 19; c++) { add(c,5,0); add(c,6,0); }
      // Layer 1: inner area
      for (let r = 3; r < 9; r++) for (let c = 5; c < 15; c++) add(c,r,1);
      // Layer 2: centre block
      for (let r = 4; r < 8; r++) for (let c = 7; c < 13; c++) add(c,r,2);
      // Layer 3: top
      for (let r = 5; r < 7; r++) for (let c = 8; c < 12; c++) add(c,r,3);
      return pos;
    }
  },
  mountain: {
    name: '🗻 Mountain',
    build() {
      const pos = [];
      const dedup = new Set();
      const add = (c, r, l) => { const k=`${c},${r},${l}`; if(!dedup.has(k)){dedup.add(k);pos.push([c,r,l]);} };
      // Three peaks side by side, each a pyramid
      const peaks = [0, 7, 14];
      peaks.forEach(offset => {
        // Base 6 wide
        for (let c = 0; c < 6; c++) add(offset+c, 6, 0);
        for (let c = 0; c < 6; c++) add(offset+c, 7, 0);
        // Step up
        for (let c = 1; c < 5; c++) add(offset+c, 4, 0);
        for (let c = 1; c < 5; c++) add(offset+c, 5, 0);
        for (let c = 1; c < 5; c++) add(offset+c, 4, 1);
        for (let c = 1; c < 5; c++) add(offset+c, 5, 1);
        // Mid
        for (let c = 2; c < 4; c++) add(offset+c, 2, 0);
        for (let c = 2; c < 4; c++) add(offset+c, 3, 0);
        for (let c = 2; c < 4; c++) add(offset+c, 2, 1);
        for (let c = 2; c < 4; c++) add(offset+c, 3, 1);
        for (let c = 2; c < 4; c++) add(offset+c, 2, 2);
        for (let c = 2; c < 4; c++) add(offset+c, 3, 2);
        // Peak
        add(offset+2.5, 1, 3);
      });
      // Valley floor connecting all three
      for (let c = 0; c < 20; c++) { add(c, 8, 0); add(c, 9, 0); }
      // Foothills layer 1
      for (let c = 0; c < 20; c++) add(c, 8, 1);
      return pos;
    }
  }
};

function saveState() {

      })),

    };

}

function loadState() {

    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function clearSavedState() {
  localStorage.removeItem(LS_STATE);
}

function getBest(layout) {
  try {
    const b = JSON.parse(localStorage.getItem(LS_BEST) || '{}');
    return b[layout] || null;
  } catch(e) { return null; }
}

function saveBest(layout, score) {
  try {
    const b = JSON.parse(localStorage.getItem(LS_BEST) || '{}');
    if (!b[layout] || score > b[layout]) b[layout] = score;
    localStorage.setItem(LS_BEST, JSON.stringify(b));

// ═══════════════════════════════════════════
// RNG (seeded)
// ═══════════════════════════════════════════
function seededRNG(seed) {
  let s = seed;
  return () => {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function shuffle(arr, rng) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ═══════════════════════════════════════════
// TILE GENERATION — guaranteed solvable
// Uses reverse simulation: repeatedly pick two
// free tiles and assign them a matching pair.
// ═══════════════════════════════════════════
function generateTiles(positions, seed) {
  const rng = seededRNG(seed);
  if (positions.length % 2 !== 0) positions.pop();
  const count = positions.length;

  // Build tile objects with no matchId yet
  const tiles = positions.map(([col, row, layer], i) => ({
    id: i, emoji: null, matchId: null,
    col, row, layer, removed: false, el: null,
  }));

  // Build suit pool (pairs)
  const suitPool = [];
  let si = 0;
  while (suitPool.length < count) {
    const suit = SUITS[si % SUITS.length];
    suitPool.push({ emoji: suit.emoji, matchId: suit.id });
    suitPool.push({ emoji: suit.emoji, matchId: suit.id });
    si++;
  }
  suitPool.length = count;
  shuffle(suitPool, rng);
  let suitIdx = 0;

  // Reverse simulation: assign pairs to free tiles until all assigned
  const unassigned = new Set(tiles.map(t => t.id));

  // isFree check against a working set
  function isFreeSim(tile, tileMap) {
    const others = [...tileMap.values()].filter(t => t.id !== tile.id);
    const above = others.some(t =>
      t.layer === tile.layer + 1 &&
      Math.abs(t.col - tile.col) < 1 &&
      Math.abs(t.row - tile.row) < 1
    );
    if (above) return false;
    const leftBlocked  = others.some(t => t.layer === tile.layer && Math.abs(t.row - tile.row) < 1 && t.col + 1 === tile.col);
    const rightBlocked = others.some(t => t.layer === tile.layer && Math.abs(t.row - tile.row) < 1 && t.col - 1 === tile.col);
    return !leftBlocked || !rightBlocked;
  }

  // Working tile map (only unassigned tiles present)
  const tileMap = new Map(tiles.map(t => [t.id, { ...t }]));

  let attempts = 0;
  while (unassigned.size > 0 && attempts < count * 20) {
    attempts++;
    // Get free tiles among unassigned
    const freeIds = [...unassigned].filter(id => isFreeSim(tileMap.get(id), tileMap));
    if (freeIds.length < 2) {
      // Stuck — fall back to random assignment for remaining tiles
      break;
    }
    // Pick two random free tiles
    const i = Math.floor(rng() * freeIds.length);
    let j = Math.floor(rng() * (freeIds.length - 1));
    if (j >= i) j++;
    const idA = freeIds[i];
    const idB = freeIds[j];

    // Assign a matching pair to both
    const pair = suitPool[suitIdx++];
    tiles[idA].emoji   = pair.emoji;
    tiles[idA].matchId = pair.matchId;
    tiles[idB].emoji   = pair.emoji;
    tiles[idB].matchId = pair.matchId;

    // Remove from working map and unassigned
    tileMap.delete(idA);
    tileMap.delete(idB);
    unassigned.delete(idA);
    unassigned.delete(idB);
  }

  // Assign any remaining unmatched tiles (fallback)
  const remaining = [...unassigned];
  for (let k = 0; k < remaining.length; k += 2) {
    const pair = suitPool[suitIdx++] || suitPool[0];
    const idA = remaining[k], idB = remaining[k + 1];
    if (idA !== undefined) { tiles[idA].emoji = pair.emoji; tiles[idA].matchId = pair.matchId; }
    if (idB !== undefined) { tiles[idB].emoji = pair.emoji; tiles[idB].matchId = pair.matchId; }
  }

  return tiles;
}

// ═══════════════════════════════════════════
// FREE TILE CHECK
// A tile is FREE if:
//  1. Nothing on top of it (higher layer overlapping)
//  2. Left OR right side is open
// ═══════════════════════════════════════════
function isFree(tile, tiles) {
  if (tile.removed) return false;
  const active = tiles.filter(t => !t.removed && t.id !== tile.id);

  // Check above: a tile at layer+1 that overlaps (within 1 unit col AND row)
  const blocked_above = active.some(t =>
    t.layer === tile.layer + 1 &&
    Math.abs(t.col - tile.col) < 1 &&
    Math.abs(t.row - tile.row) < 1
  );
  if (blocked_above) return false;

  // Check left: any tile same layer whose right edge touches our left
  const blocked_left = active.some(t =>
    t.layer === tile.layer &&
    Math.abs(t.row - tile.row) < 1 &&
    t.col + 1 === tile.col
  );

  // Check right
  const blocked_right = active.some(t =>
    t.layer === tile.layer &&
    Math.abs(t.row - tile.row) < 1 &&
    t.col - 1 === tile.col
  );

  return !blocked_left || !blocked_right;
}

function getFreeTiles() {
  return state.tiles.filter(t => !t.removed && isFree(t, state.tiles));
}

function hasValidMoves() {
  const free = getFreeTiles();
  for (let i = 0; i < free.length; i++)
    for (let j = i + 1; j < free.length; j++)
      if (free[i].matchId === free[j].matchId) return true;
  return false;
}

// ═══════════════════════════════════════════
// DOT GRID RENDERER (Circle suit)
// ═══════════════════════════════════════════
// Dot positions for 1–9 in a 3×3 grid (col 0-2, row 0-2)
const DOT_POSITIONS = {
  1: [[1,1]],
  2: [[1,0],[1,2]],
  3: [[1,0],[1,1],[1,2]],
  4: [[0,0],[2,0],[0,2],[2,2]],
  5: [[0,0],[2,0],[1,1],[0,2],[2,2]],
  6: [[0,0],[2,0],[0,1],[2,1],[0,2],[2,2]],
  7: [[0,0],[2,0],[1,0],[0,1],[2,1],[0,2],[2,2]],  // top 3, mid 2 sides, bot 2
  8: [[0,0],[1,0],[2,0],[0,1],[2,1],[0,2],[1,2],[2,2]],
  9: [[0,0],[1,0],[2,0],[0,1],[1,1],[2,1],[0,2],[1,2],[2,2]],
};

// Colours cycling through the 9 circle tiles
const DOT_COLORS = ['#e53935','#fb8c00','#fdd835','#43a047','#1e88e5','#8e24aa','#00897b','#6d4c41','#546e7a'];

function getTileContent(emoji) {
  if (!emoji.startsWith('dots:')) return `<span>${emoji}</span>`;
  const n = parseInt(emoji.split(':')[1]);
  const dots = DOT_POSITIONS[n] || [];
  const color = DOT_COLORS[n - 1];
  const sw = 36; const sh = 44; // svg canvas
  const cellW = sw / 3; const cellH = sh / 3;
  const r = 4.5;
  const circles = dots.map(([cx, cy]) => {
    const x = cellW * cx + cellW / 2;
    const y = cellH * cy + cellH / 2;
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r}" fill="${color}" stroke="rgba(0,0,0,0.15)" stroke-width="0.5"/>`;
  }).join('');
  return `<svg width="${sw}" height="${sh}" viewBox="0 0 ${sw} ${sh}" xmlns="http://www.w3.org/2000/svg">${circles}</svg>`;
}

// ═══════════════════════════════════════════
// BOARD RENDER
// ═══════════════════════════════════════════
const TILE_W = 46;
const TILE_H = 54;
const LAYER_OFFSET_X = 4;
const LAYER_OFFSET_Y = 4;

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  const active = state.tiles.filter(t => !t.removed);
  if (active.length === 0) return;

  const minC = Math.min(...active.map(t => t.col));
  const minR = Math.min(...active.map(t => t.row));
  const maxC = Math.max(...active.map(t => t.col));
  const maxR = Math.max(...active.map(t => t.row));
  const maxL = Math.max(...active.map(t => t.layer));

  const bw = (maxC - minC + 1) * TILE_W + maxL * LAYER_OFFSET_X + 8;
  const bh = (maxR - minR + 1) * TILE_H + maxL * LAYER_OFFSET_Y + 8;

  board.style.width  = bw + 'px';
  board.style.height = bh + 'px';

  state.tiles.forEach(tile => {
    if (tile.removed) return;
    const el = document.createElement('div');
    el.className = 'tile';
    el.dataset.id = tile.id;

    const x = (tile.col - minC) * TILE_W + tile.layer * LAYER_OFFSET_X;
    const y = (tile.row - minR) * TILE_H + tile.layer * LAYER_OFFSET_Y;
    el.style.left   = x + 'px';
    el.style.top    = y + 'px';
    el.style.width  = TILE_W + 'px';
    el.style.height = TILE_H + 'px';
    el.style.zIndex = tile.layer * 10 + 1;
    el.innerHTML = getTileContent(tile.emoji);

    tile.el = el;
    el.addEventListener('click', () => onTileClick(tile));
    board.appendChild(el);
  });

  updateFreeState();
  requestAnimationFrame(() => requestAnimationFrame(() => fitBoard(false)));
}

function updateFreeState() {
  state.tiles.forEach(tile => {
    if (!tile.el || tile.removed) return;
    const free = isFree(tile, state.tiles);
    tile.el.classList.toggle('free', free);
    tile.el.classList.toggle('blocked', !free);
    if (state.selected === tile.id) tile.el.classList.add('selected');
  });
}

function fitBoard(animate) {
  const app   = document.getElementById('app');
  const board = document.getElementById('board');
  const wrap  = document.querySelector('.board-wrap');

  // Reset board transform for clean measurement
  app.style.transform   = 'none';
  board.style.transform = 'none';
  wrap.style.height     = '';

  const appW   = app.offsetWidth;
  const boardW = parseFloat(board.style.width) || board.offsetWidth;
  const boardH = parseFloat(board.style.height) || board.offsetHeight;

  // Scale board to fit within app content (minus 16px left + 16px right padding)
  const boardScale   = Math.min(1, (appW - 32) / boardW);
  const scaledBoardH = Math.ceil(boardH * boardScale);

  board.style.transition      = 'none';
  board.style.transform       = `scale(${boardScale})`;
  board.style.transformOrigin = 'top left';
  wrap.style.height           = (scaledBoardH + 32) + 'px';
}

// ═══════════════════════════════════════════
// TILE CLICK
// ═══════════════════════════════════════════
function onTileClick(tile) {
  if (tile.removed) return;
  if (!isFree(tile, state.tiles)) {
    showToast('Tile is blocked');
    return;
  }

  if (!state.timerRunning) startTimer();

  if (state.selected === null) {
    state.selected = tile.id;
    tile.el.classList.add('selected');
  } else if (state.selected === tile.id) {
    state.selected = null;
    tile.el.classList.remove('selected');
  } else {
    const prev = state.tiles.find(t => t.id === state.selected);
    if (prev && prev.matchId === tile.matchId) {
      // MATCH!
      matchTiles(prev, tile);
    } else {
      // No match — swap selection
      prev.el.classList.remove('selected');
      state.selected = tile.id;
      tile.el.classList.add('selected');
      showToast('No match');
    }
  }
}

function matchTiles(a, b) {
  state.moves++;
  state.removedPairs++;
  state.undoStack.push({ a: a.id, b: b.id });

  let doneCount = 0;

  [a, b].forEach(t => {
    t.el.classList.remove('selected');
    t.el.classList.add('matched');
    t.el.addEventListener('animationend', () => {
      t.removed = true;
      if (t.el && t.el.parentNode) t.el.parentNode.removeChild(t.el);
      t.el = null;
      doneCount++;
      if (doneCount === 2) {
        updateProgress();
        updateFreeState();
        saveState();
        checkEnd();
      }
    }, { once: true });
  });

  state.selected = null;
  updateHUD();
}

// ═══════════════════════════════════════════
// UNDO
// ═══════════════════════════════════════════
function undo() {
  if (state.undoStack.length === 0) { showToast('Nothing to undo'); return; }
  const { a: aid, b: bid } = state.undoStack.pop();
  const ta = state.tiles.find(t => t.id === aid);
  const tb = state.tiles.find(t => t.id === bid);
  ta.removed = false;
  tb.removed = false;
  state.removedPairs--;
  state.moves++;
  state.selected = null;
  renderBoard();
  fitBoard(false);
  updateHUD();
  updateProgress();
  saveState();
  showToast('Undone ↩');
}

// ═══════════════════════════════════════════
// HINT
// ═══════════════════════════════════════════
function hint() {
  const free = getFreeTiles();
  for (let i = 0; i < free.length; i++) {
    for (let j = i + 1; j < free.length; j++) {
      if (free[i].matchId === free[j].matchId) {
        [free[i], free[j]].forEach(t => {
          t.el.classList.add('hint');
          t.el.addEventListener('animationend', () => t.el.classList.remove('hint'), { once: true });
        });
        return;
      }
    }
  }
  showToast('No moves left!');
}

// ═══════════════════════════════════════════
// SHUFFLE — guaranteed solvable using same
// reverse-simulation as generateTiles
// ═══════════════════════════════════════════
function shuffleBoard() {
  const active = state.tiles.filter(t => !t.removed);
  if (active.length < 2) return;

  // Build suit pool from existing pairs (preserve pair counts)
  const rng = seededRNG(Date.now());
  const suitPool = active.map(t => ({ emoji: t.emoji, matchId: t.matchId }));
  shuffle(suitPool, rng);
  let suitIdx = 0;

  // isFree check against a working map
  function isFreeSim(tile, tileMap) {
    const others = [...tileMap.values()].filter(t => t.id !== tile.id);
    const above = others.some(t =>
      t.layer === tile.layer + 1 &&
      Math.abs(t.col - tile.col) < 1 &&
      Math.abs(t.row - tile.row) < 1
    );
    if (above) return false;
    const leftBlocked  = others.some(t => t.layer === tile.layer && Math.abs(t.row - tile.row) < 1 && t.col + 1 === tile.col);
    const rightBlocked = others.some(t => t.layer === tile.layer && Math.abs(t.row - tile.row) < 1 && t.col - 1 === tile.col);
    return !leftBlocked || !rightBlocked;
  }

  // Clear matchIds on active tiles and build working map
  active.forEach(t => { t.emoji = null; t.matchId = null; });
  const tileMap = new Map(active.map(t => [t.id, { ...t }]));
  const unassigned = new Set(active.map(t => t.id));

  let attempts = 0;
  while (unassigned.size > 0 && attempts < active.length * 20) {
    attempts++;
    const freeIds = [...unassigned].filter(id => isFreeSim(tileMap.get(id), tileMap));
    if (freeIds.length < 2) break;

    const i = Math.floor(rng() * freeIds.length);
    let j = Math.floor(rng() * (freeIds.length - 1));
    if (j >= i) j++;

    const idA = freeIds[i];
    const idB = freeIds[j];
    const pair = suitPool[suitIdx++];

    // Find the actual tile objects and assign
    const tA = state.tiles.find(t => t.id === idA);
    const tB = state.tiles.find(t => t.id === idB);
    tA.emoji = pair.emoji; tA.matchId = pair.matchId;
    tB.emoji = pair.emoji; tB.matchId = pair.matchId;

    tileMap.delete(idA);
    tileMap.delete(idB);
    unassigned.delete(idA);
    unassigned.delete(idB);
  }

  // Fallback: assign any remaining unmatched tiles
  const remaining = [...unassigned];
  for (let k = 0; k < remaining.length; k += 2) {
    const pair = suitPool[suitIdx++] || suitPool[0];
    const tA = state.tiles.find(t => t.id === remaining[k]);
    const tB = state.tiles.find(t => t.id === remaining[k + 1]);
    if (tA) { tA.emoji = pair.emoji; tA.matchId = pair.matchId; }
    if (tB) { tB.emoji = pair.emoji; tB.matchId = pair.matchId; }
  }

  state.selected = null;
  renderBoard();
  saveState();
  showToast('Board shuffled 🔀');
}

// ═══════════════════════════════════════════
// CHECK WIN / STUCK
// ═══════════════════════════════════════════
function checkEnd() {
  const remaining = state.tiles.filter(t => !t.removed);
  if (remaining.length === 0) {
    stopTimer();
    showWin();
    return;
  }
  if (!hasValidMoves()) {
    document.getElementById('overlayStuck').classList.add('show');
  }
}

// ═══════════════════════════════════════════
// WIN SCREEN
// ═══════════════════════════════════════════
function showWin() {
  clearSavedState();
  const secs = Math.floor(state.elapsed / 1000);
  const score = Math.max(0, 10000 - secs * 2 - state.moves * 5);
  const best = getBest(state.layoutKey);
  saveBest(state.layoutKey, score);

  document.getElementById('winTime').textContent  = fmtTime(secs);
  document.getElementById('winMoves').textContent = state.moves;
  document.getElementById('winScore').textContent = score;
  document.getElementById('winBest').textContent  = Math.max(score, best || 0);
  document.getElementById('overlayWin').classList.add('show');
}

// ═══════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════
let timerInterval = null;

function startTimer() {
  state.startTime = Date.now();
  state.timerRunning = true;
  timerInterval = setInterval(tickTimer, 500);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  if (state.timerRunning && state.startTime) {
    state.elapsed += Date.now() - state.startTime;
    state.startTime = null;
  }
  state.timerRunning = false;
}

function tickTimer() {
  const total = state.elapsed + (state.startTime ? Date.now() - state.startTime : 0);
  document.getElementById('timerVal').textContent = fmtTime(Math.floor(total / 1000));
}

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════
// HUD & PROGRESS
// ═══════════════════════════════════════════
function updateHUD() {
  const remaining = state.tiles.filter(t => !t.removed).length / 2;
  document.getElementById('pairsLeft').textContent = remaining;
  document.getElementById('movesVal').textContent  = state.moves;

  const best = getBest(state.layoutKey);
  const bw = document.getElementById('bestWrap');
  bw.textContent = best ? `Best score: ${best}` : '';
}

function updateProgress() {
  const total = state.totalPairs;
  const done  = state.removedPairs;
  const pct   = total > 0 ? (done / total * 100).toFixed(1) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLeft').textContent = `${total - done} pairs left`;
  document.getElementById('progressTotal').textContent = `${done}/${total}`;
  updateHUD();
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1600);
}

// ═══════════════════════════════════════════
// NEW GAME
// ═══════════════════════════════════════════
function newGame(seed) {
  stopTimer();
  document.getElementById('overlayWin').classList.remove('show');
  document.getElementById('overlayStuck').classList.remove('show');

  const positions = LAYOUTS[state.layoutKey].build();
  state.seed = seed || Date.now();
  state.tiles = generateTiles(positions, state.seed);
  state.selected = null;
  state.moves = 0;
  state.elapsed = 0;
  state.startTime = null;
  state.timerRunning = false;
  state.undoStack = [];
  state.totalPairs = state.tiles.length / 2;
  state.removedPairs = 0;

  buildLayoutBar();
  renderBoard();
  updateProgress();
  updateHUD();
  document.getElementById('timerVal').textContent = '0:00';
  clearSavedState();
}

// ═══════════════════════════════════════════
// RESTORE SAVED
// ═══════════════════════════════════════════
function restoreGame(saved) {
  state.layoutKey    = saved.layoutKey || 'turtle';
  state.moves        = saved.moves || 0;
  state.elapsed      = saved.elapsed || 0;
  state.seed         = saved.seed;
  state.totalPairs   = saved.totalPairs;
  state.removedPairs = saved.removedPairs;
  state.selected     = null;
  state.timerRunning = false;
  state.startTime    = null;
  state.undoStack    = [];

  state.tiles = saved.tiles.map(t => ({ ...t, el: null }));

  buildLayoutBar();
  renderBoard();
  updateProgress();
  updateHUD();
  document.getElementById('timerVal').textContent = fmtTime(Math.floor(state.elapsed / 1000));
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
function init() {
  const saved = loadState();
  if (saved && saved.tiles && saved.tiles.some(t => !t.removed)) {
    restoreGame(saved);
    showToast('Game restored ✦');
  } else {
    newGame();
  }

  document.getElementById('btnNew').addEventListener('click', newGame);
  document.getElementById('btnUndo').addEventListener('click', undo);
  document.getElementById('btnHint').addEventListener('click', hint);
  document.getElementById('btnShuffle').addEventListener('click', shuffleBoard);
  document.getElementById('btnWinNew').addEventListener('click', newGame);
  document.getElementById('btnWinReplay').addEventListener('click', () => newGame(state.seed));
  document.getElementById('btnStuckShuffle').addEventListener('click', () => {
    document.getElementById('overlayStuck').classList.remove('show');
    shuffleBoard();
    if (!hasValidMoves()) showToast('Still no moves — shuffle again?');
  });
  document.getElementById('btnStuckNew').addEventListener('click', newGame);

  // Pause timer on visibility change
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && state.timerRunning) {
      state.elapsed += Date.now() - state.startTime;
      state.startTime = null;
      state.timerRunning = false;
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      saveState();
    } else if (!document.hidden && state.moves > 0 && !state.timerRunning) {
      // resume on return only if game was in progress
      startTimer();
    }
  });
}

init();
</script>
